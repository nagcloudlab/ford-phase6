apiVersion: apps/v1
kind: Deployment
metadata:
  name: bar-service-deployment
  labels:
    app: bar-rs
spec:
  replicas: 4
  selector:
    matchLabels:
      app: bar
  template:
    metadata:
      labels:
        app: bar
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["us-central1-a", "us-central1-c"]
      containers:
      - name: bar-service
        image: docker.io/nagabhushanamn/bar-service:v1
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
          requests:
            memory: "64Mi"
            cpu: "250m"
        
    