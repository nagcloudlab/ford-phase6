apiVersion: apps/v1
kind: Deployment
metadata:
  name: foo-service-deployment
  labels:
    app: foo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: foo
  template:
    metadata:
      labels:
        app: foo
    spec:
      containers:
      - name: foo-service
        image: docker.io/nagabhushanamn/foo-service:v2
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "500Mi"
            cpu: "1"

--- 
apiVersion: v1
kind: Service
metadata:
  name: foo-service
spec:
  selector:
    app: foo
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: LoadBalancer


