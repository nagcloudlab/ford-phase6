server:
  port: ${PORT:8080}

spring:
  application:
    name: upi-transfer-service-redis
  datasource:
    url: jdbc:h2:mem:upidb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Rate limiter config
redis:
  rate-limit:
    max-transfers: ${RATE_LIMIT_MAX:10}
    window-seconds: ${RATE_LIMIT_WINDOW:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
