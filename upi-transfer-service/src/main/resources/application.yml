server:
  port: ${PORT:8080}
  servlet:
    session:
      tracking-modes: cookie

spring:
  application:
    name: upi-transfer-service
  datasource:
    url: jdbc:h2:mem:upidb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console

# To enable Pub/Sub, run with: --spring.profiles.active=pubsub
# For emulator: export PUBSUB_EMULATOR_HOST=localhost:8085

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
