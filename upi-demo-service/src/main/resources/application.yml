server:
  port: ${PORT:8080}

spring:
  application:
    name: upi-demo-service
  datasource:
    url: jdbc:h2:mem:upidb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  thymeleaf:
    cache: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
