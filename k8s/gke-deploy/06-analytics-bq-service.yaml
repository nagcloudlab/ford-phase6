apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-bq
  namespace: upi-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-bq
  template:
    metadata:
      labels:
        app: analytics-bq
    spec:
      containers:
        - name: analytics-bq
          image: us-central1-docker.pkg.dev/upi-workshop-492606/upi-repo/analytics-bq:latest
          ports:
            - containerPort: 8083
          env:
            - name: GCP_PROJECT_ID
              valueFrom:
                configMapKeyRef:
                  name: upi-config
                  key: GCP_PROJECT_ID
            - name: BQ_DATASET
              valueFrom:
                configMapKeyRef:
                  name: upi-config
                  key: BQ_DATASET
            - name: BQ_TABLE
              valueFrom:
                configMapKeyRef:
                  name: upi-config
                  key: BQ_TABLE
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 45
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-bq
  namespace: upi-system
spec:
  selector:
    app: analytics-bq
  ports:
    - port: 80
      targetPort: 8083
  type: ClusterIP
