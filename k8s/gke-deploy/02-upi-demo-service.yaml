apiVersion: apps/v1
kind: Deployment
metadata:
  name: upi-demo-service
  namespace: upi-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upi-demo-service
  template:
    metadata:
      labels:
        app: upi-demo-service
    spec:
      containers:
        - name: upi-demo-service
          image: us-central1-docker.pkg.dev/upi-workshop-492606/upi-repo/upi-demo-service:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: upi-demo-service
  namespace: upi-system
spec:
  selector:
    app: upi-demo-service
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
