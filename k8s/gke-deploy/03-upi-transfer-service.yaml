apiVersion: apps/v1
kind: Deployment
metadata:
  name: upi-transfer-service
  namespace: upi-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upi-transfer-service
  template:
    metadata:
      labels:
        app: upi-transfer-service
    spec:
      containers:
        - name: upi-transfer-service
          image: us-central1-docker.pkg.dev/upi-workshop-492606/upi-repo/upi-transfer-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "pubsub"
            - name: GCP_PROJECT_ID
              valueFrom:
                configMapKeyRef:
                  name: upi-config
                  key: GCP_PROJECT_ID
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: upi-transfer-service
  namespace: upi-system
spec:
  selector:
    app: upi-transfer-service
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
