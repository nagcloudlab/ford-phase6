server:
  port: ${PORT:8081}
  servlet:
    session:
      tracking-modes: cookie

spring:
  application:
    name: notification-service
  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:test-project}

pubsub:
  subscription: notification-sub

management:
  endpoints:
    web:
      exposure:
        include: health,info
