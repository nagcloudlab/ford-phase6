apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: run-analytics-bq-
spec:
  pipelineRef:
    name: subscriber-cicd-pipeline
  params:
    - name: repo-url
      value: https://github.com/nagcloudlab/ford-phase6.git
    - name: revision
      value: main
    - name: image
      value: us-central1-docker.pkg.dev/upi-workshop-492606/upi-repo/analytics-bq:latest
    - name: project-dir
      value: analytics-service-bigquery
    - name: service-name
      value: analytics-bq
    - name: project-id
      value: upi-workshop-492606
    - name: port
      value: "8083"
    - name: env-vars
      value: "GCP_PROJECT_ID=upi-workshop-492606,BQ_DATASET=upi_analytics,BQ_TABLE=transactions"
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: pvc-analytics-bq
    - name: maven-cache
      emptyDir: {}
