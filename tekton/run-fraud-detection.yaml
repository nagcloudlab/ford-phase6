apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: run-fraud-
spec:
  pipelineRef:
    name: subscriber-cicd-pipeline
  params:
    - name: repo-url
      value: https://github.com/nagcloudlab/ford-phase6.git
    - name: revision
      value: main
    - name: image
      value: us-central1-docker.pkg.dev/upi-workshop-492606/upi-repo/fraud-detection-service:latest
    - name: project-dir
      value: fraud-detection-service
    - name: service-name
      value: fraud-detection-service
    - name: project-id
      value: upi-workshop-492606
    - name: port
      value: "8082"
    - name: env-vars
      value: "GCP_PROJECT_ID=upi-workshop-492606"
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: pvc-fraud
    - name: maven-cache
      emptyDir: {}
